<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ PAGE_TITLE }}</title>

    <!-- Graph styles -->
    <link rel="stylesheet" href="/static/graph.css" />

    <style>
      /* Reset + full-page layout */
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --secondary:  #7b97aa;
        --tertiary:   #84a59d;
        --gray:       #9b9b9b;
        --light:      #f5f5f5;
        --lightgray:  #d4d4d4;
        --dark:       #141021;
        --darkgray:   #484848;
        --bodyFont:   "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: var(--light);
        font-family: var(--bodyFont);
      }

      #graph-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.6rem 1.2rem;
        background: rgba(245, 245, 245, 0.9);
        backdrop-filter: blur(6px);
        border-bottom: 1px solid var(--lightgray);
      }

      #graph-header h1 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        color: var(--dark);
      }

      #graph-header a {
        font-size: 0.85rem;
        color: var(--secondary);
        text-decoration: none;
      }

      #graph-header a:hover {
        text-decoration: underline;
      }

      #graph-wrapper {
        position: fixed;
        top: 44px; /* header height */
        left: 0;
        right: 0;
        bottom: 0;
      }

      .graph-container-global {
        position: absolute;
        inset: 0;
        background: var(--light);
      }

      .graph-canvas {
        width: 100%;
        height: 100%;
      }
    </style>

    <!-- CDN dependencies — order matters: D3, then PixiJS, then Tween.js -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@23/dist/tween.umd.js"></script>
  </head>

  <body>
    <div id="graph-header">
      <h1>{{ PAGE_TITLE }}</h1>
      <a href="/">← Back to notes</a>
    </div>

    <div id="graph-wrapper">
      <div
        class="graph-container-global"
        data-graph-url="/graph.json"
        data-cfg='{{ GRAPH_CFG }}'
      >
        <div class="graph-canvas"></div>
      </div>
    </div>

    <!-- Graph rendering script -->
    <script src="/static/graph.js"></script>
  </body>
</html>
